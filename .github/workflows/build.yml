name: Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup JDK

        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission

        run: chmod +x gradlew

      - name: Run tests

        run: ./gradlew test